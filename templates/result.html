{% extends "base.html" %}

{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-color: rgb(176, 255, 244);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .result-box {
        max-width: 400px;
        padding: 30px;
        border-radius: 20px;
        background: white;
        box-shadow: 0 0 20px rgba(0,0,0,0.15);
        text-align: center;
    }

    .score {
        font-size: 40px;
        font-weight: bold;
        margin: 20px 0;
    }
</style>

<div class="result-box">

    <h2>Quiz Result</h2>

    <div class="score">
        {{ score }} / {{ total }}
    </div>

    {% if score == total %}
        <p class="text-success">Excellent! 🎉</p>
    {% elif score >= total//2 %}
        <p class="text-warning">Good Job 👍</p>
    {% else %}
        <p class="text-danger">Keep Practicing 💪</p>
    {% endif %}

    <a href="{{ url_for('quiz.category_page') }}" class="btn btn-primary w-100 mt-3">
        Try Another Quiz
    </a>

    <a href="{{ url_for('quiz.home') }}" class="btn btn-dark w-100 mt-2">
        Go Home
    </a>

</div>

{% endblock %}
