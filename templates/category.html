{% extends "base.html" %} {% block content %}

<link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
  rel="stylesheet"
/>

<style>
  body {
    background-color: rgb(176, 255, 244);
  }

  .category-box {
    background-color: blue;
    color: white;
    border-radius: 15px;
    padding: 40px;
    transition: 0.3s;
    text-align: center;
    font-weight: 600;
    cursor: pointer;
  }

  .category-box:hover {
    background-color: black;
    transform: scale(1.05);
  }
  .custom-select-box {
    width: 250px;
    text-align: left;
  }

  .custom-dropdown {
    border-radius: 10px;
    padding: 10px;
    font-weight: 500;
    border: 2px solid #000;
    transition: 0.3s;
  }

  .custom-dropdown:focus {
    border-color: blue;
    box-shadow: 0 0 8px rgba(0, 0, 255, 0.3);
  }
</style>

<div class="container text-center mt-5">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">Welcome, {{ session['user'] }}</h5>
    <a href="/logout" class="btn btn-danger">Logout</a>
  </div>

  <div class="mb-4 d-flex justify-content-center">
    <div class="custom-select-box">
      <label class="mb-2 fw-bold">Select Questions</label>
      <select id="questionCount" class="form-select custom-dropdown">
        <option value="5">5 Questions</option>
        <option value="10">10 Questions</option>
        <option value="20">20 Questions</option>
        <option value="30">30 Questions</option>
      </select>
    </div>
  </div>
  <h2 class="mb-4">Select Category</h2>

  <div class="row g-4 justify-content-center">

    <div class="col-md-4">
      <div class="category-box" onclick="startQuiz('history')">History</div>
    </div>

    <div class="col-md-4">
      <div class="category-box" onclick="startQuiz('ca')">Current Affairs</div>
    </div>

    <div class="col-md-4">
      <div class="category-box" onclick="startQuiz('it')">IT</div>
    </div>

    <div class="col-md-4">
      <div class="category-box" onclick="startQuiz('gk')">
        General Knowledge
      </div>
    </div>

    <div class="col-md-4">
      <div class="category-box" onclick="startQuiz('science')">Science</div>
    </div>
  </div>
</div>

<script>
  function startQuiz(category) {
    let count = document.getElementById("questionCount").value;

    window.location.href = `/quiz?category=${category}&count=${count}`;
  }
</script>

{% endblock %}
