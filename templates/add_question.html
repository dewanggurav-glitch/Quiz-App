{% extends "base.html" %}

{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #74ebd5, #9face6);
    }

    .card {
        border-radius: 20px;
    }

    .form-control, .form-select {
        border-radius: 10px;
    }

    .btn-success {
        border-radius: 10px;
        font-weight: bold;
    }
</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">

    <div class="card shadow-lg p-4" style="width: 500px;">
        
        <h3 class="text-center mb-4">➕ Add New Question</h3>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Question</label>
                <textarea name="question" class="form-control" rows="2" required></textarea>
            </div>

            <div class="row">
                <div class="col-6 mb-3">
                    <input name="option1" class="form-control" placeholder="Option 1" required>
                </div>
                <div class="col-6 mb-3">
                    <input name="option2" class="form-control" placeholder="Option 2" required>
                </div>
                <div class="col-6 mb-3">
                    <input name="option3" class="form-control" placeholder="Option 3" required>
                </div>
                <div class="col-6 mb-3">
                    <input name="option4" class="form-control" placeholder="Option 4" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Correct Answer</label>
                <input name="correct_answer" class="form-control" placeholder="Must match one option" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Category</label>
                <select name="category" class="form-select" required>
                    <option value="">Select Category</option>
                    <option value="it">💻 IT</option>
                    <option value="gk">🌍 General Knowledge</option>
                    <option value="history">📜 History</option>
                    <option value="science">🔬 Science</option>
                    <option value="ca">📰 Current Affairs</option>
                </select>
            </div>

            <button type="submit" class="btn btn-success w-100">Add Question</button>

            <a href="/admin" class="btn btn-secondary w-100 mt-2">⬅ Back to Dashboard</a>

        </form>

    </div>

</div>

{% endblock %}
