{% extends "base.html" %}

{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-color: #f5f5f5;
    }
</style>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Admin Dashboard</span>

    <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-light btn-sm">
        Logout
    </a>
</nav>

<div class="container mt-4">
    
    <div class="row g-4">

        <!-- Quiz Settings -->
        <div class="col-md-6">
            <div class="card p-3 shadow">
                <h5>Quiz Settings</h5>

                <form method="POST" action="/save-settings">
                    <label class="mt-2">Time Limit (seconds)</label>
                    <input type="number" name="time_limit" class="form-control mb-2" placeholder="30">

                    <label>Questions per Quiz</label>
                    <input type="number" name="question_count" class="form-control mb-3" placeholder="10">

                    <button type="submit" class="btn btn-primary w-100">Save Settings</button>
                </form>
            </div>
        </div>

        <!-- Question Management -->
        <div class="col-md-6">
            <div class="card p-3 shadow">
                <h5>Manage Questions</h5>

                <a href="/add-question" class="btn btn-success w-100 mb-2">Add Question</a>
                <a href="/update-question" class="btn btn-warning w-100 mb-2">Update Question</a>
                <a href="/delete-question" class="btn btn-danger w-100">Delete Question</a>
            </div>
        </div>

    </div>

</div>

{% endblock %}
