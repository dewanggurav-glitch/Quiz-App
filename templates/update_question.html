{% extends "base.html" %}

{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-color: #f4f6f9;
    }
    .card {
        border-radius: 15px;
    }
    .nav-tabs .nav-link.active {
        background-color: #0d6efd;
        color: white;
    }
</style>

<div class="container mt-4">

    <h3 class="mb-4 text-center">📋 Manage Questions</h3>

    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <a class="nav-link" href="/update-question">All</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/update-question?category=it">💻 IT</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/update-question?category=gk">🌍 GK</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/update-question?category=history">📜 History</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/update-question?category=science">🔬 Science</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/update-question?category=ca">📰 CA</a>
        </li>
    </ul>

    <div class="card p-3 shadow">
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>No.</th>
                    <th>ID</th>
                    <th>Question</th>
                    <th>Category</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for q in questions %}
                <tr>
                    <td><span class="badge bg-primary">{{ loop.index }}</span></td>
                    <td>{{ q.id }}</td>
                    <td>{{ q.question }}</td>
                    <td>{{ q.category }}</td>
                    <td>
                        <button class="btn btn-warning btn-sm"
                            onclick="fillForm(
                                '{{ q.id }}',
                                `{{ q.question }}`,
                                '{{ q.option1 }}',
                                '{{ q.option2 }}',
                                '{{ q.option3 }}',
                                '{{ q.option4 }}',
                                '{{ q.correct_answer }}',
                                '{{ q.category }}'
                            )">
                            Edit
                        </button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="card p-4 shadow mt-4">
        <h5>Edit Question</h5>

        <form method="POST">

            <input name="id" id="id" class="form-control mb-2" readonly>

            <textarea name="question" id="question" class="form-control mb-2"></textarea>

            <input name="option1" id="option1" class="form-control mb-2">
            <input name="option2" id="option2" class="form-control mb-2">
            <input name="option3" id="option3" class="form-control mb-2">
            <input name="option4" id="option4" class="form-control mb-2">

            <input name="correct_answer" id="correct_answer" class="form-control mb-2">

            <select name="category" id="category" class="form-control mb-3">
                <option value="it">IT</option>
                <option value="gk">GK</option>
                <option value="history">History</option>
                <option value="science">Science</option>
                <option value="ca">CA</option>
            </select>

            <button class="btn btn-warning w-100">Update Question</button>

            <a href="/admin" class="btn btn-secondary w-100 mt-2">⬅ Back</a>

        </form>
    </div>

</div>

<script>
function fillForm(id, question, op1, op2, op3, op4, answer, category) {
    document.getElementById("id").value = id;
    document.getElementById("question").value = question;
    document.getElementById("option1").value = op1;
    document.getElementById("option2").value = op2;
    document.getElementById("option3").value = op3;
    document.getElementById("option4").value = op4;
    document.getElementById("correct_answer").value = answer;
    document.getElementById("category").value = category;
}
</script>

{% endblock %}
